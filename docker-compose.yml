services:
  gimnasio:
    build:
      context: .
      dockerfile: Dockerfile
    image: gimnasio-frontend:latest
    container_name: Gimnasio-Frontend
    restart: unless-stopped
    ports:
      - "5016:80"
    networks:
      - gimnasio-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  gimnasio-network:
    driver: bridge
